<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HK_Diagram — Mermaid ↔ 직교 UML 에디터</title>
<style>
  :root { --bd:#d8dee4; --bg:#f6f8fa; --ink:#1f2328; --accent:#3d7ebf; --sel:#e8590c; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Malgun Gothic','Segoe UI',sans-serif; color:var(--ink);
         height:100vh; display:flex; flex-direction:column; }
  header { padding:8px 14px; border-bottom:1px solid var(--bd); display:flex; gap:8px;
           align-items:center; background:#fff; flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0 6px 0 0; font-weight:700; }
  header .sp { flex:1; }
  select, button { font:inherit; padding:5px 10px; border:1px solid var(--bd); background:#fff;
           border-radius:6px; cursor:pointer; }
  button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  button.on { background:#fff3e6; border-color:var(--sel); color:#b3520a; }
  button:hover { filter:brightness(0.97); }
  #kind { font-size:12px; color:var(--accent); font-weight:600; }
  main { flex:1; display:grid; grid-template-columns: 320px 1fr 260px; min-height:0; }
  textarea { width:100%; height:100%; border:0; border-right:1px solid var(--bd); resize:none;
             padding:12px; font-family:'Consolas','D2Coding',monospace; font-size:12.5px;
             line-height:1.5; outline:none; }
  .stage { overflow:auto; background:var(--bg);
           background-image:linear-gradient(#0000000a 1px,transparent 1px),
                            linear-gradient(90deg,#0000000a 1px,transparent 1px);
           background-size:20px 20px; padding:20px; position:relative; }
  .stage svg { background:#fff; box-shadow:0 1px 6px #0002; }
  .hk-node { cursor:pointer; }
  .hk-node.sel > rect, .hk-node.sel > ellipse, .hk-node.sel > polygon,
  .hk-node.sel > path:first-child, .hk-node.sel > rect:last-child {
    stroke:var(--sel) !important; stroke-width:2.4 !important; }
  .hk-node.src > rect, .hk-node.src > ellipse, .hk-node.src > polygon { stroke:#2f9e44 !important; stroke-width:2.4 !important; }
  .hk-node.drop > rect, .hk-node.drop > ellipse, .hk-node.drop > polygon,
  .hk-node.drop > path:first-child, .hk-node.drop > rect:last-child {
    stroke:#2f9e44 !important; stroke-width:2.8 !important; }
  #hk-linkline { pointer-events:none; }
  .panel { border-left:1px solid var(--bd); background:#fff; padding:12px; overflow:auto; font-size:13px; }
  .panel h2 { font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:#57606a; margin:0 0 8px; }
  .panel label { display:block; font-size:12px; color:#57606a; margin:10px 0 3px; }
  .panel input, .panel select, .panel textarea { width:100%; font:inherit; font-size:12.5px;
           padding:5px 7px; border:1px solid var(--bd); border-radius:5px; }
  .panel textarea { font-family:'Consolas',monospace; resize:vertical; }
  .panel .danger { width:100%; margin-top:14px; background:#fff0f0; border-color:#e0a0a0; color:#b3261e; }
  .panel .empty { color:#8a949e; font-style:italic; }
  .err { color:#c0392b; padding:16px; font-family:monospace; white-space:pre-wrap; }
  .hint { font-size:11px; color:#8a949e; margin-top:10px; line-height:1.5; }
</style>
</head>
<body>
<header>
  <h1>HK_Diagram</h1>
  <select id="example" title="예제">
    <option value="character.mmd">예제: 클래스/객체</option>
    <option value="flow.mmd">예제: 플로우차트</option>
    <option value="state.mmd">예제: 상태도</option>
    <option value="er.mmd">예제: ERD</option>
    <option value="seq.mmd">예제: 시퀀스</option>
  </select>
  <span id="kind"></span>
  <button id="add">＋ 노드</button>
  <button id="del">🗑 삭제</button>
  <span class="sp"></span>
  <a href="https://github.com/hkkima/HK_Diagram" target="_blank" rel="noopener" style="font-size:12px;color:#57606a;text-decoration:none">GitHub ↗</a>
  <button id="dl-svg">SVG 저장</button>
  <button id="dl-png" class="primary">PNG 저장</button>
</header>
<main>
  <textarea id="code" spellcheck="false"></textarea>
  <div class="stage" id="stage"></div>
  <div class="panel" id="panel"><p class="empty">노드를 클릭해 편집하세요.</p>
    <div class="hint">· 노드 클릭 → 편집<br>· 노드 → 다른 노드로 <b>드래그 = 연결</b><br>· 노드 → 빈 곳으로 드래그 = 같은 줄 순서 변경<br>· 코드 직접 수정도 즉시 반영(양방향)</div>
  </div>
</main>
<script type="module" src="web/editor.js"></script>
</body>
</html>
